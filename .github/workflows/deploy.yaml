name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API key into constants.js
        run: |
          echo "const MAPS_API_KEY = '${{ secrets.MAPS_API_KEY }}';" >> js/constants.js

      - name: Bump service worker cache version
        run: sed -i "s/worldcup-roots-v[0-9]*/worldcup-roots-$(date +%Y%m%d%H%M)/g" sw.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4