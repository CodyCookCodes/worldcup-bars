<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local's Guide · Oakland Roots SC</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/Oakland_Roots.png" type="image/png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G5L0TEB3LN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G5L0TEB3LN');
  </script>
</head>
<body>

<!-- PAGE LOADER -->
<div id="page-loader">
  <img src="assets/Oakland_Roots.png" alt="Loading" class="loader-logo">
  <div class="loader-bar">
    <div class="loader-fill"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-top">Oakland First, Always · Soccer Trail</div>
  <div class="header-inner">
    <div class="header-logos">
      <img src="assets/Oakland_Roots.png" alt="Oakland Roots SC" class="header-logo">
      <div class="header-title">
        <h1>Local's <span>Guide</span></h1>
      </div>
      <img src="assets/Oakland_Soul.png" alt="Oakland Soul" class="header-logo">
    </div>
    <div class="sub">East Bay</div>
  </div>
</header>

<!-- MOSAIC DIVIDER -->
<div class="mosaic-divider"></div>

<!-- MAP -->
<div class="map-section">
  <div id="map"></div>
  <div id="map-loading" class="map-loading">
    <div class="spinner"></div>
    <p>Loading map&#8230;</p>
  </div>
</div>

<!-- MOSAIC DIVIDER -->
<div class="mosaic-divider"></div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-label">Explore the East Bay:</div>
  <div class="filter-buttons" id="filterButtons">
    <button class="filter-btn filter-btn--guide" onclick="window.location.href='index.html'">← Bar Finder</button>
    <button class="filter-btn active" id="filterAll" onclick="guideFilterAll(this)">All</button>
    <button class="filter-btn filter-btn--events" id="filterEvents" onclick="guideFilterEvents(this)">Events</button>
    <button class="filter-btn filter-btn--restaurants" id="filterRestaurants" onclick="guideFilterRestaurants(this)">Restaurants</button>
    <button class="filter-btn filter-btn--guide-hotels" id="filterHotels" onclick="guideFilterHotels(this)">Hotels</button>
  </div>
</div>

<!-- GUIDE LIST -->
<div class="list-section" id="guideList">
  <div class="state-box">
    <div class="spinner"></div>
    <p>Loading guide&#8230;</p>
  </div>
</div>

<!-- MOSAIC DIVIDER -->
<div class="mosaic-divider"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-badge">Oakland Roots SC · Oakland First, Always</div>
  <br>
  Soccer Trail 2026 · East Bay &nbsp;|&nbsp;
  <a href="https://www.oaklandrootssc.com" target="_blank">oaklandrootssc.com</a>
  <div class="suggest-bar">
    <p>Know a great spot we missed?</p>
    <a href="https://google.com" target="_blank" class="suggest-link">Suggest a Place</a>
  </div>
</footer>

<script src="js/config.js" onerror="console.log('No local config, using deployed key')"></script>
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/guide.js"></script>

</body>
</html>
